{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset</title>

    <link rel="stylesheet" href="{% static 'userform/password_reset_form.css' %}">
</head>

<body>

<div class="container">

    <div class="card">

        <h2>Reset Password</h2>

        <form method="POST">
            {% csrf_token %}

            {% for field in form %}
                <div class="form-group">
                    {{ field.label_tag }}
                    {{ field }}
                    <div class="error">
                        {{ field.errors }}
                    </div>
                </div>
            {% endfor %}

            <button type="submit">
                Send Confirmation Link
            </button>

        </form>

    </div>

</div>

</body>
</html>
