{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
</head>
<body>

<h2>All Complaints</h2>

<table border="1" cellpadding="10">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Status</th>
        <th>Update Status</th>
    </tr>

    {% for c in complaints %}
    <tr>
        <td>{{ c.complaint_id }}</td>
        <td>{{ c.complaint_title }}</td>
        <td>{{ c.status }}</td>

        <td>
            <!-- 🔥 INLINE UPDATE FORM -->
            <form method="POST" style="display:flex; gap:10px;">
                {% csrf_token %}
                <input type="hidden" name="complaint_id" value="{{ c.id }}">

                <select name="status">
                    <option {% if c.status == "Pending" %}selected{% endif %}>Pending</option>
                    <option {% if c.status == "In Progress" %}selected{% endif %}>In Progress</option>
                    <option {% if c.status == "Resolved" %}selected{% endif %}>Resolved</option>
                </select>

                <button type="submit">Update</button>
            </form>
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
