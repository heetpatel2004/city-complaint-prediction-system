{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | Smart City</title>
    <link rel="stylesheet" href="{% static 'userform/signup.css' %}">
     <link rel="shortcut icon" type="image/png" href="{% static 'userform/images/favicon.png' %}">
</head>
<body>

<div class="signup-container">
    <!-- Logo Section -->
    <div class="logo">
        <img src="{% static 'userform/images/building_2.png' %}" alt="Smart City Logo">
        <div class="logo-text">
            <h2>Smart City</h2>
            <p>Complaint System</p>
        </div>
    </div>

    <!-- Sign Up Form -->
    <div class="form-box">
        <h3>Sign Up</h3>
        <p class="subtitle">Create your account to report city issues</p>

        <form method = "post">
            {% csrf_token %}

            <div class="input-group">
                <input type="text" placeholder="username" name="username" required>
            </div>

            <div class="input-group">
                <input type="email" placeholder="Email Address" name="email" required>
            </div>

            <div class="input-group">
                <input type="tel" placeholder="Phone Number" name="phone" required>
            </div>

            <div class="input-group">
                <input type="password" placeholder="Password" name="password" 
                pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}"
title="Must contain 8 characters, one uppercase, one lowercase, one number and one special character" required>
            </div>

            <div class="input-group">
                <input type="password" placeholder="Confirm Password" name="conf_password" required>
            </div>

            <div class="terms">
                <input type="checkbox" required>
                <label>I agree to the <a href="#">Terms & Conditions</a></label>
            </div>

            <button type="submit" class="signup-btn">Create Account</button>

            <div class="login-link">
                Already have an account? <a href="{% url 'userform:login' %}">Login</a>
            </div>

        </form>
    </div>

</div>

</body>
</html>
