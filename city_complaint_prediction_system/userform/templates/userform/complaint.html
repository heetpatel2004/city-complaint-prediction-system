{% load static %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Complaint | Smart City</title>
    <link rel="stylesheet" href="{% static 'userform/complaint.css' %}">
</head>
{% include "userform/navbar.html" %}
<body>

<div class="form-container">

    <div class="form-header">
        <h2>Submit a Complaint</h2>
        <p>Please fill out the form below to report a city issue.</p>
    </div>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="row">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="fullname" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
        </div>

        <div class="input-group">
            <label>Phone Number</label>
            <input type="text" id="phone" name="mobile" placeholder="Enter your phone number" required>
        </div>
        <div class="input-group">
            <label>Complaint Date</label>
            <input type="date" name="complaint_date" required>
        </div>

        <div class="input-group">
            <label>Complaint Category</label>
            <select name="category" required>
                <option value="">Select Category</option>
                <option value="Garbage">Garbage</option>
                <option value="Water Supply">Water Supply</option>
                <option value="Road Damage">Road Damage</option>
                <option value="Street Light">Street Light</option>
            </select>
        </div>

        <div class="input-group">
            <label>Area</label>
            {% comment %} <input type="text" name="area" placeholder="Enter your area" required> {% endcomment %}
            <select name="area" id="area" required>
            <option value="">Select Area</option>
            <option value="Ward 1">Ward 1</option>
            <option value="Ward 2">Ward 2</option>
            <option value="Ward 3">Ward 3</option>
            <option value="Ward 4">Ward 4</option>
            <option value="Ward 5">Ward 5</option>
    </select>
        </div>

        <div class="input-group">
                <label>Severity</label>
                <select name="severity" required>
                    <option value="">Select Severity</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>
            </div>

            <div class="input-group">
                <label>Affected People</label>
                <input type="number" name="affected_people" placeholder="Enter number of affected people" min="1"
                    required>
            </div>

        <div class="input-group">
            <label>Describe the Issue</label>
            <textarea name="description" rows="5" placeholder="Enter the details of the complaint..." ></textarea>
        </div>

        <div class="input-group">
            <label>Attach Image (Optional)</label>
            <input type="file" name="image" accept="image/*">
        </div>

        <button type="submit" class="submit-btn">
            Submit Complaint
        </button>

    </form>

</div>

</body>
{% include "userform/footer.html" %}
<script>
document.getElementById("phone").addEventListener("input", function(e) {
    // Remove non-numeric characters
    this.value = this.value.replace(/[^0-9]/g, '');

    // Limit to 10 digits
    if (this.value.length > 10) {
        this.value = this.value.slice(0, 10);
    }
});
document.getElementById("fullname").addEventListener("input", function() {
    // Remove numbers and special characters
    this.value = this.value.replace(/[^A-Za-z ]/g, '');
});
</script>
</html>
